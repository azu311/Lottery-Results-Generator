<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽選処理ツール</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:680px;margin:0 auto}
header{margin-bottom:2rem}
header h1{font-size:20px;font-weight:600;margin-bottom:4px}
header p{font-size:13px;color:#666}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.drop-area{border:1.5px dashed #ccc;border-radius:8px;padding:1.1rem;text-align:center;cursor:pointer;transition:background .15s;position:relative;user-select:none}
.drop-area:hover{background:#f9f9f7}
.drop-area.dragover{background:#eef6ff;border-color:#378ADD}
.drop-area input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-icon{font-size:18px;margin-bottom:5px}
.drop-label{font-size:13px;color:#888}
.file-list{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.file-tag{display:flex;align-items:center;gap:6px;background:#f5f5f3;border-radius:6px;padding:5px 10px;font-size:12px}
.file-tag span.name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-tag .rm{margin-left:auto;cursor:pointer;color:#999;font-size:14px;line-height:1;background:none;border:none;padding:0}
.file-tag .rm:hover{color:#333}
.spacer{height:8px}
.run-btn{width:100%;padding:11px;font-size:14px;font-weight:600;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;transition:opacity .15s;margin-top:.5rem}
.run-btn:hover{opacity:.85}
.run-btn:disabled{opacity:.35;cursor:not-allowed}
.progress{display:none;margin-top:1rem}
.progress-bar{height:4px;background:#e5e5e0;border-radius:2px;overflow:hidden;margin-bottom:10px}
.progress-fill{height:100%;background:#378ADD;border-radius:2px;transition:width .3s}
.log{font-size:12px;color:#666;line-height:2;font-family:monospace}
.result{display:none;margin-top:1rem;padding:1.1rem;background:#f5f5f3;border-radius:8px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.stat{background:#fff;border-radius:8px;padding:.85rem;text-align:center;border:1px solid #e5e5e0}
.stat .n{font-size:24px;font-weight:600}
.stat .l{font-size:11px;color:#888;margin-top:3px}
.won-n{color:#276221}
.lost-n{color:#922B21}
.dl-btn{width:100%;padding:10px;font-size:13px;font-weight:600;background:#378ADD;color:#fff;border:none;border-radius:8px;cursor:pointer;transition:opacity .15s}
.dl-btn:hover{opacity:.85}
.err{display:none;margin-top:.75rem;padding:.85rem 1rem;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;font-size:13px;color:#991b1b}
.step-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:#1a1a1a;color:#fff;border-radius:50%;font-size:11px;font-weight:600;margin-right:6px;flex-shrink:0}
.card-header{display:flex;align-items:center;margin-bottom:10px}
.card-header .card-title{margin-bottom:0}
.threshold-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.threshold-row label{font-size:13px;color:#555;min-width:120px;flex-shrink:0}
.threshold-row input[type=range]{flex:1}
.threshold-row .val{font-size:13px;font-weight:600;min-width:60px;color:#1a1a1a}
.threshold-note{font-size:11px;color:#888;margin-top:4px}
.login-screen{position:fixed;inset:0;background:#f5f5f3;display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:#fff;border:1px solid #e5e5e0;border-radius:14px;padding:2rem;width:100%;max-width:360px}
.login-card h2{font-size:18px;font-weight:600;margin-bottom:4px}
.login-card p{font-size:13px;color:#888;margin-bottom:1.5rem}
.login-field{margin-bottom:1rem}
.login-field label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px}
.login-field input{width:100%;padding:9px 12px;font-size:14px;border:1px solid #d0d0cc;border-radius:8px;outline:none;transition:border .15s}
.login-field input:focus{border-color:#378ADD}
.login-btn{width:100%;padding:11px;font-size:14px;font-weight:600;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-top:.5rem;transition:opacity .15s}
.login-btn:hover{opacity:.85}
.login-err{display:none;margin-top:.75rem;padding:.7rem 1rem;background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;font-size:13px;color:#991b1b;text-align:center}
</style>
</head>
<body>
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <h2>抽選処理ツール</h2>
    <p>ログインしてください</p>
    <div class="login-field">
      <label>ログイン名</label>
      <input type="text" id="login-user" placeholder="ログイン名" autocomplete="username">
    </div>
    <div class="login-field">
      <label>パスワード</label>
      <input type="password" id="login-pass" placeholder="パスワード" autocomplete="current-password">
    </div>
    <div class="login-err" id="login-err">ログイン名またはパスワードが違います</div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
  </div>
</div>
<div class="wrap">
  <header>
    <h1>抽選処理ツール</h1>
    <p>抽選回答データとシーズン全チケットデータから、当落判定済みExcelを生成します</p>
  </header>

  <div class="card">
    <div class="card-header">
      <span class="step-badge">1</span>
      <div class="card-title">抽選回答データ（CSV・複数可）</div>
    </div>
    <div class="drop-area" id="drop-lottery">
      <input type="file" id="inp-lottery" accept=".csv" multiple>
      <div class="drop-icon">📂</div>
      <div class="drop-label">クリックまたはドロップ — cp932エンコードのCSV</div>
    </div>
    <div class="file-list" id="list-lottery"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="step-badge">2</span>
      <div class="card-title">24-25シーズン 全チケットデータ（.xlsx）</div>
    </div>
    <div class="drop-area" id="drop-2425">
      <input type="file" id="inp-2425" accept=".xlsx">
      <div class="drop-icon">📊</div>
      <div class="drop-label">24-25シーズンの購入者一覧レポート</div>
    </div>
    <div class="file-list" id="list-2425"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="step-badge">3</span>
      <div class="card-title">25-26シーズン 全チケットデータ（.xlsx）</div>
    </div>
    <div class="drop-area" id="drop-2526">
      <input type="file" id="inp-2526" accept=".xlsx">
      <div class="drop-icon">📊</div>
      <div class="drop-label">25-26シーズンの購入者一覧レポート</div>
    </div>
    <div class="file-list" id="list-2526"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="step-badge">4</span>
      <div class="card-title">当選ハードルの設定</div>
    </div>
    <div class="threshold-row">
      <label>24-25：<span id="lbl-2425">0</span>回以下</label>
      <input type="range" id="thr-2425" min="0" max="5" step="1" value="0" oninput="document.getElementById('lbl-2425').textContent=this.value;updateNote()">
    </div>
    <div class="threshold-row">
      <label>25-26：<span id="lbl-2526">0</span>回以下</label>
      <input type="range" id="thr-2526" min="0" max="5" step="1" value="0" oninput="document.getElementById('lbl-2526').textContent=this.value;updateNote()">
    </div>
    <div class="threshold-note" id="thr-note">→ 両シーズンとも0回の人のみ当選（デフォルト）</div>
  </div>

  <button class="run-btn" id="run-btn" disabled>実行する</button>

  <div class="progress" id="progress">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="log" id="log-area"></div>
  </div>

  <div class="err" id="err-box"></div>

  <div class="result" id="result-box">
    <div class="stats-grid" id="stats-grid"></div>
    <button class="dl-btn" id="dl-btn">📥 Excelをダウンロード</button>
  </div>
</div>

<script>
const files = {lottery:[], '2425':null, '2526':null};
let outputWB = null;

function updateNote() {
  const v1 = document.getElementById('thr-2425').value;
  const v2 = document.getElementById('thr-2526').value;
  const n = document.getElementById('thr-note');
  if(v1==='0'&&v2==='0') n.textContent='→ 両シーズンとも0回の人のみ当選（デフォルト）';
  else n.textContent='→ 24-25が'+v1+'回以下、かつ25-26が'+v2+'回以下の人が当選';
}

// ファイル入力イベント
document.getElementById('inp-lottery').addEventListener('change', e => addFiles('lottery', e.target.files));
document.getElementById('inp-2425').addEventListener('change', e => addFiles('2425', e.target.files));
document.getElementById('inp-2526').addEventListener('change', e => addFiles('2526', e.target.files));

// ドラッグ&ドロップ
['lottery','2425','2526'].forEach(key => {
  const el = document.getElementById('drop-'+key);
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover'); });
  el.addEventListener('dragleave', () => el.classList.remove('dragover'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('dragover');
    addFiles(key, e.dataTransfer.files);
  });
});

function addFiles(key, fl) {
  if (key === 'lottery') {
    files.lottery = [...files.lottery, ...Array.from(fl)];
  } else {
    files[key] = fl[0];
  }
  renderList(key);
  checkReady();
}

function renderList(key) {
  const el = document.getElementById('list-' + key);
  const arr = key === 'lottery' ? files.lottery : (files[key] ? [files[key]] : []);
  el.innerHTML = arr.map((f, i) => `
    <div class="file-tag">
      <span>📄</span>
      <span class="name">${f.name}</span>
      <button class="rm" onclick="removeFile('${key}',${i})">✕</button>
    </div>`).join('');
}

function removeFile(key, i) {
  if (key === 'lottery') files.lottery.splice(i, 1);
  else files[key] = null;
  renderList(key);
  checkReady();
}

function checkReady() {
  document.getElementById('run-btn').disabled = !(files.lottery.length > 0 && files['2425'] && files['2526']);
}

function log(msg, pct) {
  document.getElementById('log-area').innerHTML += msg + '<br>';
  if (pct != null) document.getElementById('prog-fill').style.width = pct + '%';
}

function showErr(msg) {
  const el = document.getElementById('err-box');
  el.style.display = 'block';
  el.textContent = 'エラー: ' + msg;
}

async function readCSV(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const bytes = new Uint8Array(e.target.result);
        const text = new TextDecoder('shift-jis').decode(bytes);
        const wb = XLSX.read(text, {type:'string'});
        res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:''}));
      } catch(err) { rej(err); }
    };
    r.onerror = rej;
    r.readAsArrayBuffer(file);
  });
}

async function readXLSX(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
        const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:''});
        const headers = raw[11];
        const data = raw.slice(12).filter((_, i) => i !== 0).map(row => {
          const obj = {};
          headers.forEach((h, i) => obj[h] = row[i] ?? '');
          return obj;
        });
        res(data);
      } catch(err) { rej(err); }
    };
    r.onerror = rej;
    r.readAsArrayBuffer(file);
  });
}

function convertDate(val) {
  const m = String(val).match(/(\d+)月(\d+)日/);
  return m ? String(m[1]).padStart(2,'0') + String(m[2]).padStart(2,'0') : '';
}

async function runProcess() {
  document.getElementById('err-box').style.display = 'none';
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('progress').style.display = 'block';
  document.getElementById('log-area').innerHTML = '';
  document.getElementById('prog-fill').style.width = '0%';
  document.getElementById('run-btn').disabled = true;

  try {
    log('抽選回答データを読み込み中...', 10);
    const lotteryRows = [];
    for (const f of files.lottery) {
      lotteryRows.push(...await readCSV(f));
    }
    lotteryRows.sort((a, b) => Number(a['登録NO']) - Number(b['登録NO']));
    log(`　→ ${lotteryRows.length}件 読み込み完了`, 25);

    log('24-25シーズンデータを読み込み中...', 35);
    const t2425 = await readXLSX(files['2425']);
    log(`　→ ${t2425.length}件`, 50);

    log('25-26シーズンデータを読み込み中...', 55);
    const t2526 = await readXLSX(files['2526']);
    log(`　→ ${t2526.length}件`, 65);

    log('メールアドレス照合・当落判定中...', 70);
    const cnt2425 = {}, cnt2526 = {};
    t2425.forEach(r => { const e = String(r['Customer Email']||'').toLowerCase(); if(e) cnt2425[e] = (cnt2425[e]||0)+1; });
    t2526.forEach(r => { const e = String(r['Customer Email']||'').toLowerCase(); if(e) cnt2526[e] = (cnt2526[e]||0)+1; });

    const thr2425 = Number(document.getElementById('thr-2425').value);
    const thr2526 = Number(document.getElementById('thr-2526').value);
    log(`　→ 当選基準：24-25が${thr2425}回以下 かつ 25-26が${thr2526}回以下`, 68);

    let won = 0, lost = 0;
    const outRows = lotteryRows.map(r => {
      const email = String(r['eメール']||'').toLowerCase();
      const c2425 = cnt2425[email] || 0;
      const c2526 = cnt2526[email] || 0;
      const result = (c2425 <= thr2425 && c2526 <= thr2526) ? '当選' : '落選';
      if (result === '当選') won++; else lost++;
      return {
        ...r,
        '24-25': c2425,
        '25-26': c2526,
        '当落': result,
        '観戦希望日(数字)': result === '当選' ? convertDate(r['観戦希望日']) : ''
      };
    });
    log(`　→ 当選: ${won}件 / 落選: ${lost}件`, 85);

    log('Excelファイルを生成中...', 92);
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(outRows);
    const colKeys = Object.keys(outRows[0]);
    const widths = {'登録NO':10,'対応状況':10,'登録日時':20,'更新日時':20,'登録方法':10,'登録者':10,'友だちNO':10,'姓':8,'名':10,'性別':6,'生年月日':14,'郵便番号':10,'住所':35,'マンション等':20,'eメール':28,'観戦希望日':28,'24-25':10,'25-26':10,'当落':8,'観戦希望日(数字)':14};
    ws['!cols'] = colKeys.map(k => ({wch: widths[k]||15}));

    // 游ゴシック設定
    if(!wb.Workbook) wb.Workbook={};
    if(!wb.Workbook.WBProps) wb.Workbook.WBProps={};
    const range = XLSX.utils.decode_range(ws['!ref']);
    for(let R = range.s.r; R <= range.e.r; R++){
      for(let C = range.s.c; C <= range.e.c; C++){
        const addr = XLSX.utils.encode_cell({r:R, c:C});
        if(!ws[addr]) continue;
        if(!ws[addr].s) ws[addr].s = {};
        ws[addr].s.font = {name:'游ゴシック', sz:10};
      }
    }

    XLSX.utils.book_append_sheet(wb, ws, '抽選回答データ');
    outputWB = wb;

    document.getElementById('prog-fill').style.width = '100%';
    log('完了！', 100);

    document.getElementById('stats-grid').innerHTML = `
      <div class="stat"><div class="n">${lotteryRows.length}</div><div class="l">総件数</div></div>
      <div class="stat"><div class="n won-n">${won}</div><div class="l">当選</div></div>
      <div class="stat"><div class="n lost-n">${lost}</div><div class="l">落選</div></div>`;
    document.getElementById('result-box').style.display = 'block';
    document.getElementById('dl-btn').onclick = () => XLSX.writeFile(outputWB, '抽選回答データ_当落判定.xlsx');

  } catch(e) {
    showErr(e.message || String(e));
  }
  document.getElementById('run-btn').disabled = false;
  checkReady();
}

document.getElementById('run-btn').addEventListener('click', runProcess);

function doLogin(){
  const u=document.getElementById('login-user').value;
  const p=document.getElementById('login-pass').value;
  if(u==='voreas' && p==='63.f446!h(E3'){
    document.getElementById('login-screen').style.display='none';
  } else {
    const e=document.getElementById('login-err');
    e.style.display='block';
    document.getElementById('login-pass').value='';
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none')doLogin();
});
</script>
</body>
</html>
